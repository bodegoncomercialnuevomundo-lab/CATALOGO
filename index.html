<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Nuevo Mundo | Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="bg-slate-950 font-['Plus_Jakarta_Sans'] text-slate-200 pb-32">
    
    <header id="inicio" class="p-6 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 border-b border-slate-800">
        <div class="flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-2xl font-bold tracking-tighter text-white uppercase">Nuevo Mundo</span>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] text-emerald-500 font-bold uppercase tracking-wider">Abierto ahora</span>
                </div>
            </div>
        </div>
    </header>

    <div class="p-4">
        <div class="relative rounded-3xl overflow-hidden aspect-[4/3] shadow-2xl border border-slate-800 bg-slate-900">
            <img alt="Interior de Nuevo Mundo" class="w-full h-full object-cover" src="bienvenida.jpg"/>
            <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/40 to-transparent"></div>
            <div class="absolute bottom-0 left-0 p-6">
                <h1 class="text-3xl font-bold text-white mb-1">¡Bienvenidos!</h1>
                <p class="text-slate-400 text-sm italic">Tu bodegón de confianza en la Isla.</p>
            </div>
        </div>
    </div>

    <div class="px-4 mb-10">
        <h2 class="text-white font-bold mb-4 px-2 uppercase text-xs tracking-widest opacity-50">Explorar categorías</h2>
        <div class="grid grid-cols-2 gap-4">
            <a href="#licores" class="bg-slate-900 rounded-3xl p-6 border border-slate-800 text-center flex flex-col items-center gap-2 active:scale-95 transition-all">
                <span class="text-3xl">🥃</span>
                <span class="text-xs font-bold text-white uppercase">Licores</span>
            </a>
            <a href="#combos" class="bg-slate-900 rounded-3xl p-6 border border-slate-800 text-center flex flex-col items-center gap-2 active:scale-95 transition-all">
                <span class="text-3xl">📦</span>
                <span class="text-xs font-bold text-white uppercase">Combos</span>
            </a>
        </div>
    </div>

    <div id="info" class="px-4 pb-12 grid gap-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
            <h3 class="text-white font-bold mb-4 flex items-center gap-2 italic">Métodos de Pago</h3>
            <div class="flex flex-wrap gap-2 text-[10px] font-bold">
                <span class="bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700 text-orange-400">PAGO MÓVIL</span>
                <span class="bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700 text-orange-400">ZELLE</span>
                <span class="bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700 text-orange-400">EFECTIVO</span>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl text-center">
            <h3 class="text-white font-bold mb-2">Nuestra Ubicación</h3>
            <p class="text-xs text-slate-500 mb-4 italic">Calle La Marina c/c Fraternidad, Porlamar.</p>
            <a href="https://www.google.com/maps/search/?api=1&query=Calle+La+Marina+Porlamar+Nueva+Esparta" target="_blank" class="inline-block w-full bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-orange-900/40 active:bg-orange-700">
                📍 Abrir en Google Maps
            </a>
        </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-slate-900/90 backdrop-blur-xl border border-white/10 rounded-3xl p-4 flex justify-around items-center shadow-2xl z-50">
        <a href="#inicio" class="flex flex-col items-center gap-1">
            <span class="text-orange-500">🏠</span>
            <span class="text-[9px] font-bold text-orange-500 uppercase">Inicio</span>
        </a>
        <a href="#combos" class="flex flex-col items-center gap-1 opacity-60">
            <span class="text-white">🛍️</span>
            <span class="text-[9px] font-bold text-white uppercase">Combos</span>
        </a>
        <a href="#info" class="flex flex-col items-center gap-1 opacity-60">
            <span class="text-white">📍</span>
            <span class="text-[9px] font-bold text-white uppercase">Info</span>
        </a>
    </nav>
</body>
</html>
